<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveM テスター利用規約同意</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #ffd6ec, #ffe8f5);
    color: #444;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .card {
    background: white;
    border-radius: 20px;
    padding: 32px;
    max-width: 560px;
    width: 92%;
    box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    animation: fadeIn 0.5s ease;
    text-align: center;
  }

  h1 { color: #ff6fa5; margin-bottom: 10px; }

  .rules {
    text-align: left;
    background: #fff5fb;
    border-radius: 14px;
    padding: 18px;
    margin-top: 20px;
    line-height: 1.8;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-top: 15px;
    font-size: 15px;
  }

  label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    font-weight: bold;
    justify-content: center;
  }

  input[type="checkbox"] { transform: scale(1.3); }

  button {
    width: 100%;
    margin-top: 22px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    background: #ff8ec2;
    color: white;
    cursor: pointer;
    transition: 0.25s;
  }

  button:disabled { background: #ccc; cursor: not-allowed; }

  button:hover:not(:disabled) {
    background: #ff6fa5;
    transform: translateY(-2px);
  }

  .success { display: none; }
  .emoji { font-size: 48px; margin-bottom: 10px; }
  .footer { margin-top: 16px; font-size: 13px; color: #999; }

  .lockScreen { display:none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- 🔒 アクセス制限画面 -->
<div class="card lockScreen" id="lockScreen">
  <h1>🔒 テスター専用ページ</h1>
  <p>アクセスコードを入力してください</p>
  <input type="password" id="accessCode" placeholder="アクセスコード">
  <button id="unlockBtn">ページを開く</button>
  <div class="footer">招待された人のみアクセスできます</div>
</div>

<!-- 利用規約ページ -->
<div class="card" id="agreementPage" style="display:none;">
  <h1>🌸 テスター利用規約 🌸</h1>
  <p>Discord IDを入力し、利用規約に同意してください。</p>

  <input type="text" id="discordId" placeholder="Discord ID (例: user_name)">

  <div class="rules">
    <strong>利用規約</strong>
    <ul>
      <li>① 配布されたMODデータを第三者へ共有・再配布しないこと。</li>
      <li>② 製作者の許可なくアップロード・公開を行わないこと。</li>
      <li>③ テスト内容・ファイル・情報を外部へ漏洩しないこと。</li>
      <li>④ Discordでの連絡に対応できること。</li>
    </ul>
  </div>

  <label>
    <input type="checkbox" id="agreeCheck">
    上記利用規約に同意します
  </label>

  <button id="nextButton" disabled>同意して完了</button>
  <div class="footer">FiveM MOD Tester Agreement</div>
</div>

<!-- 完了画面 -->
<div class="card success" id="successPage">
  <div class="emoji">✅</div>
  <h1>同意が完了しました</h1>
  <p>テスター登録ありがとうございます！</p>
  <div class="footer">情報が送信されました</div>
</div>

<script>
  // 🔑 アクセスコード（好きな文字に変更してOK）
  const ACCESS_KEY = "4161";

  const lockScreen = document.getElementById('lockScreen');
  const agreementPage = document.getElementById('agreementPage');
  const successPage = document.getElementById('successPage');
  const unlockBtn = document.getElementById('unlockBtn');
  const accessInput = document.getElementById('accessCode');

  const checkbox = document.getElementById('agreeCheck');
  const button = document.getElementById('nextButton');
  const discordInput = document.getElementById('discordId');

  // 初期表示
  lockScreen.style.display = 'block';

  unlockBtn.addEventListener('click', () => {
    if (accessInput.value === ACCESS_KEY) {
      lockScreen.style.display = 'none';
      agreementPage.style.display = 'block';
    } else {
      alert('アクセスコードが違います');
    }
  });

  function updateButton() {
    button.disabled = !(checkbox.checked && discordInput.value.trim() !== '');
  }

  checkbox.addEventListener('change', updateButton);
  discordInput.addEventListener('input', updateButton);

  button.addEventListener('click', async () => {
    const discordId = discordInput.value.trim();

    const payload = {
      content: `📄 **テスター利用規約同意**\n\n👤 Discord: ${discordId}\n🕒 時間: ${new Date().toLocaleString()}\n🌐 UserAgent: ${navigator.userAgent}`
    };

    const WEBHOOK_URL = "https://discord.com/api/webhooks/1477287804298989683/jiMiLCaRuj_nxfK4e5Ubrn_VSCabSvQuCWNeUrG5UQ_Ulx_XMce5SL1d6s-sWB09d_Y8";

    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (e) {
      console.error('送信失敗', e);
    }

    agreementPage.style.display = 'none';
    successPage.style.display = 'block';
  });
</script>

</body>
</html>
